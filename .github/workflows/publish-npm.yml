# Publishes the root `schematic-pg` package to npm when a GitHub release is published.
#
# One-time setup (npm Trusted Publisher / OIDC):
# 1. On npm: schematic-pg → Settings → Trusted Publisher → GitHub Actions
# 2. Set owner tawsbob, repository postgrest.js, workflow publish-npm.yml
# 3. Leave environment blank (this workflow does not use GitHub Environments)
# 4. After the first successful OIDC publish, delete the NPM_TOKEN repository secret
#
# Per release:
# 1. Bump "version" in package.json and commit
# 2. Create a GitHub release with tag vX.Y.Z (e.g. v0.2.0 for version 0.2.0)
# 3. Publish the release — this workflow runs automatically

name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Verify release tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi

      - run: npm run build
      - run: npm test

      - run: npm publish
